<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilisation Theory Map</title>
    
    <!-- Black Triangle Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='0,0 100,0 0,100' fill='%23000'/></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=IBM+Plex+Sans+Arabic:wght@500;600;700&family=Inter+Tight:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-color: #f9f7f5; 
            --topbar-bg: #ffffff; 
            --text-color: #333333; 
            --topbar-text: #000000; 
            --accent-color: #3CB371; /* Medium Sea Green for Light Theme */
            --nav-inactive: #b0b0b0;
            --nav-border: #777777;
            --diamond-bg: #ffffff; /* White Diamond for Light Theme */
            --tab-bg: rgba(0, 0, 0, 0.08); /* Middle ground shade for tabs in light theme */
            
            /* Cursors */
            --cursor-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='3.5' fill='%233CB371'/></svg>") 12 12, auto;
            --cursor-alt-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='8' fill='none' stroke='%23000' stroke-width='1.5'/><circle cx='12' cy='12' r='2.5' fill='%23000'/></svg>") 12 12, auto;
        }

        /* Hidden Dark Theme Variables */
        body.dark-mode {
            --bg-color: #121212; 
            --topbar-bg: #1a1a1a; 
            --text-color: #e0e0e0; 
            --topbar-text: #ffffff; 
            --accent-color: #00BFFF; /* Deep Sky Blue for Dark Theme */
            --nav-inactive: #555555;
            --nav-border: #444444;
            --diamond-bg: #000000; /* Black Diamond for Dark Theme */
            --tab-bg: rgba(255, 255, 255, 0.08); /* Faint white tabs for dark theme */
            
            --cursor-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='3.5' fill='%2300BFFF'/></svg>") 12 12, auto;
            --cursor-alt-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='8' fill='none' stroke='%23fff' stroke-width='1.5'/><circle cx='12' cy='12' r='2.5' fill='%23fff'/></svg>") 12 12, auto;
        }

        /* Art Modes overrides */
        body.art-orange, body.dark-mode.art-orange {
            --accent-color: #f43900;
            --cursor-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='3.5' fill='%23f43900'/></svg>") 12 12, auto !important;
        }
        
        body.art-colorless {
            --accent-color: #000000;
            --cursor-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='3.5' fill='%23000000'/></svg>") 12 12, auto !important;
        }
        
        body.dark-mode.art-colorless {
            --accent-color: #ffffff;
            --cursor-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='3.5' fill='%23ffffff'/></svg>") 12 12, auto !important;
        }
        
        body.art-yellow, body.dark-mode.art-yellow {
            --bg-color: #ffe442;
            --topbar-bg: #ffe442;
            --text-color: #000000;
            --topbar-text: #000000;
            --accent-color: #000000;
            --diamond-bg: #ffe442;
            --nav-inactive: #888888;
            --nav-border: #000000;
            --tab-bg: rgba(0, 0, 0, 0.08);
            
            --cursor-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='3.5' fill='%23000000'/></svg>") 12 12, auto !important;
            --cursor-alt-style: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='8' fill='none' stroke='%23000' stroke-width='1.5'/><circle cx='12' cy='12' r='2.5' fill='%23000'/></svg>") 12 12, auto !important;
        }

        /* Background Match Mode */
        body.bg-match-mode {
            --topbar-bg: var(--bg-color);
        }

        /* Draws the black hypotenuse line specifically for Yellow Art Mode */
        body.art-yellow #topbar {
            background-image: linear-gradient(to top left, transparent 50%, var(--topbar-text) 50%, var(--topbar-text) calc(50% + 3px), transparent calc(50% + 3px));
        }

        /* Removes the hypotenuse lines when Background Match Mode is active alongside Yellow Art Mode */
        body.bg-match-mode.art-yellow #topbar {
            background-image: none;
        }

        /* Gradient Mode (Fades corners at the hypotenuse using a dynamic CSS mask) */
        body.gradient-mode #topbar {
            -webkit-mask-image: linear-gradient(to bottom right, black 45%, transparent 50%);
            mask-image: linear-gradient(to bottom right, black 45%, transparent 50%);
        }

        /* UI Auto-Hide Class */
        .ui-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* HUDless mode (Leaves bottom bar and text untouched) */
        body.hudless #topbar,
        body.hudless #alphabet-nav,
        body.hudless #bottom-right-footer,
        body.hudless #right-tab,
        body.hudless #url-bar {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* HUD Hover Reveal Zone (Right Edge) */
        #hud-hover-zone-right {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            width: 60px;
            height: 300px;
            z-index: 99;
            display: none;
        }
        body.hudless #hud-hover-zone-right {
            display: block; 
        }
        body.hudless #hud-hover-zone-right:hover ~ #right-tab,
        body.hudless #right-tab:hover {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
        }

        /* HUD Hover Reveal Zone (Left Edge for Alphabet) */
        #hud-hover-zone-left {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 60px;
            height: 60vh;
            z-index: 99;
            display: none;
        }
        body.hudless #hud-hover-zone-left {
            display: block; 
        }
        body.hudless #hud-hover-zone-left:hover ~ #alphabet-nav,
        body.hudless #alphabet-nav:hover {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
        }

        /* Minimalist Modern Custom Cursor */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            cursor: var(--cursor-style) !important;
        }
        
        body.alt-cursor * {
            cursor: var(--cursor-alt-style) !important;
        }
        
        body { 
            display: block; 
            height: 100vh; 
            overflow: hidden; /* Desktop bounded scroll */
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.4; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        p, h1, h2, h3 { margin-bottom: 7.5px; }

        /* Cursor Trail Dot */
        .cursor-trail-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            opacity: 0;
        }
        
        /* Disable trail completely in Alt Cursor Mode */
        body.alt-cursor .cursor-trail-dot {
            display: none !important;
        }

        /* Loading Screen overlay */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
            opacity: 1;
            visibility: visible;
        }

        /* Hide cursor specifically during load */
        #loading-screen, #loading-screen * {
            cursor: none !important;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Diamond Wrapper */
        .diamond-wrapper {
            position: relative;
            width: 400px; 
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .diamond-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .diamond-path {
            fill: var(--diamond-bg);
            stroke: var(--accent-color);
            stroke-width: 5px;
            stroke-linejoin: miter; /* Ensures sharp corners */
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            transition: fill 0.3s, stroke 0.3s;
            animation: drawOutline 3s linear forwards; 
        }

        @keyframes drawOutline {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        .diamond-text {
            position: relative;
            z-index: 2;
            text-align: left;
        }

        .diamond-text h1 {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600; 
            font-size: 1.8rem; 
            margin: 0;
            text-transform: uppercase;
            color: var(--topbar-text); 
            transition: color 0.3s;
        }

        /* Top Progress Bar (Static) */
        #top-line-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 6px; 
            z-index: 1000;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #top-line-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--accent-color);
            transition: background-color 0.3s;
        }

        /* Top Left Corner (Asymmetrical with Shorter Left Edge) */
        #topbar { 
            position: absolute;
            top: 0;
            left: 0;
            width: 26vw; 
            height: 14vh; 
            background-color: var(--topbar-bg); 
            color: var(--topbar-text); 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start; 
            padding: 30px 0 0 35px; 
            clip-path: polygon(0 0, 100% 0, 0 100%); 
            z-index: 100;
            transition: background-color 0.3s, color 0.3s, opacity 0.3s, visibility 0.3s;
        }

        .topbar-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .title-container {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start; 
            cursor: pointer;
        }

        .title-container:hover h1 {
            color: var(--accent-color);
            transition: color 0.2s;
        }
        
        #topbar h1 { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            font-weight: 600; 
            font-size: 1.5rem; 
            margin: 0; 
            text-transform: uppercase; 
            line-height: 1.15;
            text-align: left;
            width: 100%;
            white-space: nowrap; 
            transition: color 0.3s;
        }

        /* Right Edge Icon Tab */
        #right-tab {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 15px;
            background: var(--tab-bg);
            backdrop-filter: blur(4px);
            border-radius: 16px 0 0 16px; 
            padding: 18px 10px;
            z-index: 100;
            transition: opacity 0.3s, visibility 0.3s, background-color 0.3s;
        }

        #info-icon, #settings-icon, #theme-icon, #color-icon, #hud-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            transition: color 0.3s;
            pointer-events: auto;
            margin: 0;
            cursor: pointer;
        }

        #info-icon svg, #settings-icon svg, #theme-icon svg, #color-icon svg, #hud-icon svg {
            width: 20px; 
            height: 20px;
        }

        #info-icon:hover, #settings-icon:hover, #theme-icon:hover, #color-icon:hover, #hud-icon:hover {
            color: var(--accent-color);
        }

        /* Top Right URL Bar (Aligned to Title) */
        #url-bar {
            position: absolute;
            top: 32px; 
            right: 40px;
            text-align: right;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-color); 
            z-index: 100;
            transition: color 0.3s, opacity 0.3s, visibility 0.3s;
        }
        
        /* Bottom Right Footer Text */
        #bottom-right-footer {
            position: absolute;
            bottom: 30px;
            right: 30px;
            text-align: right;
            font-family: 'Inter Tight', sans-serif;
            font-weight: 400;
            font-size: 0.85rem;
            color: var(--text-color);
            z-index: 10;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #bottom-right-footer p {
            margin: 0;
        }
        
        /* Alphabet Nav Vertical Left Tab */
        #alphabet-nav { 
            position: absolute;
            top: 25vh; 
            bottom: 0;
            left: 0; 
            transform: none;
            display: flex; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0; 
            background: var(--tab-bg); 
            backdrop-filter: blur(4px);
            border-radius: 0 16px 16px 0; 
            width: 40px; 
            padding: 10px 0; 
            z-index: 100;
            transition: opacity 0.3s, visibility 0.3s, background-color 0.3s;
            max-height: 70vh; 
            overflow-y: auto; 
        }
        
        #alphabet-nav::-webkit-scrollbar {
            display: none; 
        }

        .nav-letter {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.95rem; 
            cursor: default;
            width: 26px; 
            height: 26px; 
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
        }

        .active-letter {
            color: var(--text-color);
            font-weight: bold;
        }
        
        .active-letter:hover { 
            background-color: rgba(128, 128, 128, 0.15); /* Faint circle hover */
            text-decoration: underline; 
            color: var(--accent-color);
        }
        
        .inactive-letter { color: var(--nav-inactive); }
        
        #main-content { 
            padding: 40px 70px 40px 85px; /* Added spacing left for alphabet tab and right for icon tab */
            height: 100vh;
            overflow-y: auto; 
            position: relative; 
        }

        /* Default Landing List classes (Desktop) */
        .landing-concept-list {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .landing-concept-col {
            flex: 1;
        }
        
        /* Split Screen Editor Menu */
        #editor-menu {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            display: none; /* Flex when active */
            background-color: var(--bg-color);
        }

        .editor-menu-btn {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter Tight', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            text-transform: uppercase;
            transition: background-color 0.3s, color 0.3s;
        }

        .editor-menu-btn.left {
            background-color: var(--bg-color);
            color: var(--text-color);
            border-right: 2px dashed var(--accent-color);
        }

        .editor-menu-btn.left:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .editor-menu-btn.right {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .editor-menu-btn.right:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        #viewer-ui, #editor-entry-list { 
            width: 50%; 
            margin: 18vh auto 0 auto; 
            position: relative;
        }

        /* Editor A-Z Concept List */
        #editor-entry-list {
            display: none;
        }

        #editor-entry-list h2 {
            font-family: 'Inter Tight', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        #concept-title { 
            font-family: 'Inter Tight', sans-serif; 
            font-weight: 700; 
            font-size: 2.5rem; 
            white-space: nowrap; 
        }
        
        #concept-description, #concept-description div { 
            font-family: 'Cormorant Garamond', serif; 
            font-weight: 500; 
            font-size: 1.75rem; 
            line-height: 1.3; 
            white-space: pre-wrap; 
        }

        /* Dynamic Font Shrinker for Long Entries (Single Increment) */
        #concept-description.reduced-font, 
        #concept-description.reduced-font div {
            font-size: 1.5rem !important; 
        }
        
        #concept-description a {
            color: var(--accent-color);
            text-decoration: underline;
            transition: opacity 0.2s;
        }
        
        #concept-description a:hover {
            opacity: 0.7;
        }

        /* Unordered List Styling (Line-height spacing + Normal Whitespace Fix) */
        #concept-description ul {
            list-style: none;
            padding-left: 25px;
            margin: 1.25em 0; 
            white-space: normal; /* Disables pre-wrap gaps */
        }
        #concept-description ul li {
            position: relative;
            margin-bottom: 0.75em; 
            line-height: 1.3; 
            white-space: normal; /* Disables pre-wrap gaps */
        }
        #concept-description ul li::before {
            content: '\2B26'; /* Medium Diamond Unicode */
            color: var(--accent-color);
            position: absolute;
            left: -25px;
            font-size: 0.75em; /* Smaller diamond */
            line-height: inherit;
            top: 0.25em; /* Optical alignment */
            transition: color 0.3s;
        }

        /* Exclude custom bullet styling from layout specific index lists */
        #concept-description .landing-concept-list ul,
        #letter-list {
            padding-left: 0 !important;
            margin: 0 !important;
        }
        #concept-description .landing-concept-list li::before,
        #letter-list li::before {
            display: none !important;
        }

        /* Settings Page Formatting (SVG Keyboard Keys) */
        .settings-content {
            white-space: normal !important;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
        }
        
        .shortcut-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 36px;
            height: 36px;
            color: var(--accent-color);
            margin-right: 12px;
            flex-shrink: 0;
        }
        .key-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .key-text {
            position: relative;
            z-index: 1;
            font-family: 'Roboto Mono', monospace !important;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            transform: translateY(-2px);
            transition: color 0.3s;
        }

        .settings-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .settings-desc-text {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.15rem;
            color: var(--text-color);
            white-space: nowrap; /* Forces key descriptions onto a single line */
        }

        /* Superscript styling for footnotes in the description */
        #concept-description sup {
            color: var(--accent-color);
            font-family: 'Roboto Mono', monospace;
            font-weight: 400; /* Unbolded */
            font-size: 0.9rem; /* Match the footnote section size */
            transition: color 0.3s;
        }

        /* Footnotes Section */
        #concept-footnotes {
            margin-top: 30px;
            padding-top: 20px;
            display: none; /* hidden by default if no footnotes */
        }

        .footnote-entry {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem; /* Smaller than description text */
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .footnote-num {
            color: var(--accent-color);
            font-weight: 400; /* Unbolded */
            font-size: 0.9rem; /* Same as the superscript above */
        }

        .footnote-text {
            flex: 1;
            outline: none;
            line-height: 1.4;
        }

        .footnote-text.editable-field {
            outline: 2px dashed var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(128, 128, 128, 0.05);
            min-height: 1.5em;
        }

        .footnote-text:empty:before {
            content: attr(data-placeholder);
            color: var(--nav-inactive);
            pointer-events: none;
        }

        /* In-Place Editor Toolbar */
        #editor-toolbar {
            display: none;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        #editor-toolbar button {
            padding: 6px 14px;
            background-color: var(--topbar-text);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            font-family: 'Inter Tight', sans-serif;
            font-weight: 700;
            transition: opacity 0.3s;
        }

        #editor-toolbar button:hover {
            opacity: 0.8;
        }

        #editor-toolbar .btn-export {
            background-color: #0056b3;
            color: white;
        }

        .editable-field {
            outline: 2px dashed var(--accent-color);
            padding: 8px;
            border-radius: 6px;
            background: rgba(128, 128, 128, 0.05);
            min-height: 1.5em;
        }

        #editor-status { position: absolute; top: 20px; right: 20px; font-family: 'Inter Tight', sans-serif; font-size: 0.8rem; color: red; font-weight: 700; display: none; z-index: 300;}

        /* --- MOBILE RESPONSIVE ADAPTATIONS (iPhone SE & Small Screens) --- */
        @media (max-width: 850px) {
            body {
                --topbar-bg: var(--bg-color); /* Force Background Match Mode on Mobile */
                height: auto;
                min-height: 100vh;
                overflow-y: auto; /* Convert to native continuous body scroll */
                overflow-x: hidden;
                position: relative; /* Contains absolute UI elements so they attach to document top/bottom */
            }

            body.art-yellow #topbar {
                background-image: none; /* Hide diagonal lines for art-yellow on Mobile */
            }

            /* Convert UI corners to absolute so they scroll out of the way naturally */
            #topbar, #alphabet-nav, #top-line-container, #url-bar, #bottom-right-footer, #editor-status, #right-tab, #hud-hover-zone-right, #hud-hover-zone-left {
                position: absolute;
            }

            #topbar {
                width: 85vw; 
                height: 80px;

    <script>
        // --- Custom Cursor Trail System ---
        function initCursorTrail() {
            const numDots = 12;
            const dots = [];
            for (let i = 0; i < numDots; i++) {
                const dot = document.createElement('div');
                dot.className = 'cursor-trail-dot';
                document.body.appendChild(dot);
                dots.push({ el: dot });
            }

            let currentDotIndex = 0;

            document.addEventListener('mousemove', (e) => {
                const dot = dots[currentDotIndex].el;
                dot.style.transition = 'none';
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
                dot.style.opacity = '0.6';
                dot.style.transform = 'translate(-50%, -50%) scale(1)';
                
                // Force reflow to restart CSS animation properly
                void dot.offsetWidth;
                
                dot.style.transition = 'opacity 0.4s ease-out, transform 0.4s ease-out';
                dot.style.opacity = '0';
                dot.style.transform = 'translate(-50%, -50%) scale(0.1)';
                
                currentDotIndex = (currentDotIndex + 1) % numDots;
            });
        }

        // --- UI Auto-Hide Engine ---
        let uiIdleTimer;
        let lastScrollY = 0;
        let isHoveringUI = false;
        let idleDelay = 1000; // Fast 1 second disappear time globally

        function resetUI() {
            const pill = document.getElementById('right-tab');
            const nav = document.getElementById('alphabet-nav');
            
            if (pill) pill.classList.remove('ui-hidden');
            if (nav) nav.classList.remove('ui-hidden');
            
            clearTimeout(uiIdleTimer);
            
            if (!isHoveringUI) {
                uiIdleTimer = setTimeout(() => {
                    if (!document.body.classList.contains('hudless')) {
                        if (pill) pill.classList.add('ui-hidden');
                        if (nav) nav.classList.add('ui-hidden');
                    }
                }, idleDelay); 
            }
        }

        function initUIAutoHide() {
            resetUI();
            
            // Switch to shorter idle detection after the initial 2s load visibility
            setTimeout(() => { idleDelay = 1000; }, 2000); 

            document.addEventListener('mousemove', resetUI);
            document.addEventListener('touchstart', resetUI);
            
            // UI Hover protection
            const pill = document.getElementById('right-tab');
            const nav = document.getElementById('alphabet-nav');
            if(pill) {
                pill.addEventListener('mouseenter', () => isHoveringUI = true);
                pill.addEventListener('mouseleave', () => { isHoveringUI = false; resetUI(); });
            }
            if(nav) {
                nav.addEventListener('mouseenter', () => isHoveringUI = true);
                nav.addEventListener('mouseleave', () => { isHoveringUI = false; resetUI(); });
            }

            // Check scroll up 
            function checkScrollDirection(scrollableElement) {
                let currentScroll = scrollableElement.scrollTop;
                if (currentScroll < lastScrollY) {
                    resetUI(); // Reveal UI on scrolling up
                }
                lastScrollY = currentScroll <= 0 ? 0 : currentScroll;
            }

            const mainContentEl = document.getElementById('main-content');
            if (mainContentEl) {
                mainContentEl.addEventListener('scroll', function() { checkScrollDirection(this); });
            }
            window.addEventListener('scroll', function() {
                let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
                if (currentScroll < lastScrollY) {
                    resetUI();
                }
                lastScrollY = currentScroll <= 0 ? 0 : currentScroll;
            });
        }

        // --- Helper: Strip "The " for Indexing ---
        function getIndexTitle(title) {
            const t = title.trim();
            if (t.toLowerCase().startsWith("the ") && t.length > 4) {
                return t.substring(4).trim();
            }
            return t;
        }

        // --- Web Audio API Synthesizer ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Catch initial user interaction to unlock audio context in browsers
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('keydown', initAudio, { once: true });

        function playSound(type) {
            try {
                initAudio();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;
                
                if (type === 'hover') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(400, now);
                    gainNode.gain.setValueAtTime(0.015, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    oscillator.start(now);
                    oscillator.stop(now + 0.05);
                } else if (type === 'click') {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(600, now);
                    oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                    gainNode.gain.setValueAtTime(0.03, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    oscillator.start(now);
                    oscillator.stop(now + 0.1);
                } else if (type === 'toggle') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(300, now);
                    oscillator.frequency.exponentialRampToValueAtTime(400, now + 0.15);
                    gainNode.gain.setValueAtTime(0.03, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
                    oscillator.start(now);
                    oscillator.stop(now + 0.15);
                } else if (type === 'success') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(500, now);
                    oscillator.frequency.setValueAtTime(750, now + 0.1);
                    gainNode.gain.setValueAtTime(0.03, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                    oscillator.start(now);
                    oscillator.stop(now + 0.3);
                } else if (type === 'alert') {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(250, now);
                    oscillator.frequency.linearRampToValueAtTime(200, now + 0.2);
                    gainNode.gain.setValueAtTime(0.02, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                    oscillator.start(now);
                    oscillator.stop(now + 0.2);
                }
            } catch (e) {
                // Silently fail if audio is unsupported or blocked by browser policy
            }
        }
        // ---------------------------------

        let concepts = [];
        let aboutConcept = {};
        
        // Tracks actively viewed concept (-1 = About Page, -2 = New Concept, -3 = Settings Menu)
        let currentConceptIndex = -1; 
        
        // State machine for Editor Mode
        let isEditorMode = false;
        let editorState = 'inactive'; // 'inactive' -> 'menu' -> 'list' -> 'active'
        let isPreviewing = false;
        
        let artMode = 0; // 0: Default, 1: Orange, 2: Colorless, 3: Yellow

        function toggleThemeMode() {
            if (artMode !== 3) {
                playSound('toggle');
                document.body.classList.toggle('dark-mode');
            } else {
                playSound('alert'); // Blocked by Yellow Paper mode
            }
        }

        function cycleArtStyle() {
            playSound('toggle');
            artMode = (artMode + 1) % 4;
            document.body.classList.remove('art-orange', 'art-colorless', 'art-yellow');
            
            if (artMode === 1) document.body.classList.add('art-orange');
            if (artMode === 2) document.body.classList.add('art-colorless');
            if (artMode === 3) document.body.classList.add('art-yellow');
        }

        function toggleHUDMode() {
            playSound('toggle');
            document.body.classList.toggle('hudless');
        }

        function loadConcepts() {
            // Load Landing Page Data
            const aboutElement = document.getElementById('about-data');
            try {
                if (aboutElement && aboutElement.textContent.trim()) {
                    aboutConcept = JSON.parse(aboutElement.textContent);
                }
            } catch (e) {
                console.error("Failed to parse about data", e);
            }
            
            // Load Standard Glossary Data
            const dataElement = document.getElementById('glossary-data');
            try {
                if (dataElement && dataElement.textContent.trim()) {
                    concepts = JSON.parse(dataElement.textContent);
                }
            } catch (e) {
                console.error("Failed to parse glossary data", e);
            }
            renderAlphabetNav();
            
            // Hash routing approach (Works natively with GitHub Pages)
            let titleToMatch = window.location.hash.replace('#', '');
            
            if (titleToMatch && titleToMatch !== '') {
                const index = concepts.findIndex(c => c.title.toLowerCase().replace(/\s+/g, '') === titleToMatch);
                
                if (index !== -1) {
                    showConcept(index);
                } else if (titleToMatch === 'controls' || titleToMatch === 'settings') {
                    showSettings();
                } else {
                    showAbout();
                }
            } else {
                showAbout();
            }
        }
        
        function updateURL(slug) {
            try {
                if (window.location.hash !== '#' + slug) {
                    window.history.pushState({ slug: slug }, "", "#" + slug);
                }
            } catch(e) {
                console.warn("Routing safely caught to prevent execution halt:", e);
            }
        }

        function renderAlphabetNav() {
            const nav = document.getElementById('alphabet-nav');
            nav.innerHTML = '';
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

            const availableLetters = new Set(concepts.map(c => getIndexTitle(c.title).charAt(0).toUpperCase()));

            alphabet.forEach(letter => {
                const span = document.createElement('span');
                span.textContent = letter;
                span.className = 'nav-letter';
                
                if (availableLetters.has(letter)) {
                    span.classList.add('active-letter');
                    span.onmouseenter = () => playSound('hover');
                    span.onclick = () => { playSound('click'); showLetter(letter); };
                } else {
                    span.classList.add('inactive-letter');
                }
                
                nav.appendChild(span);
            });
        }

        function showLetter(letter) {
            currentConceptIndex = -1; // Unbind from strict concept editing
            const filtered = concepts.filter(c => getIndexTitle(c.title).charAt(0).toUpperCase() === letter);
            
            if (filtered.length === 1) {
                showConcept(concepts.indexOf(filtered[0]));
            } 
            else if (filtered.length > 1) {
                document.getElementById('concept-title').innerText = `Concepts starting with '${letter}'`;
                
                const slug = `conceptsstartingwith'${letter.toLowerCase()}'`;
                document.getElementById('url-concept').textContent = slug;
                updateURL(slug.replace(/'/g, ''));
                
                // Inject list dynamically
                const descContainer = document.getElementById('concept-description');
                descContainer.innerHTML = `<ul id="letter-list"></ul>`;
                document.getElementById('concept-footnotes').style.display = 'none'; 
                
                const ul = document.getElementById('letter-list');
                
                filtered.forEach(c => {
                    const li = document.createElement('li');
                    li.textContent = getIndexTitle(c.title);
                    li.style.fontFamily = "'Roboto Mono', monospace";
                    li.style.fontSize = "1.2rem";
                    li.style.marginBottom = "15px";
                    li.style.color = "var(--text-color)"; 
                    li.style.transition = "color 0.2s";
                    li.style.cursor = "pointer";
                    
                    li.onmouseenter = () => { 
                        playSound('hover');
                        li.style.textDecoration = 'underline';
                        li.style.color = "var(--accent-color)";
                    };
                    li.onmouseleave = () => { 
                        li.style.textDecoration = 'none';
                        li.style.color = "var(--text-color)";
                    };
                    
                    li.onclick = () => { playSound('click'); showConcept(concepts.indexOf(c)); };
                    ul.appendChild(li);
                });
            }
            checkScrollAndResize();
        }

        function syncFootnotes(savedFootnotes = null) {
            let sups = [];
            // Dynamically scan for superscript tags exactly where they are permitted
            if (currentConceptIndex === -1) {
                ['about-main-desc', 'about-cas-desc', 'about-pc-desc', 'about-map-desc'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) sups = [...sups, ...el.querySelectorAll('sup')];
                });
            } else if (currentConceptIndex !== -3) {
                const descEl = document.getElementById('concept-description');
                if(descEl) sups = Array.from(descEl.querySelectorAll('sup'));
            }

            const markers = sups.map(sup => sup.innerText.trim()).filter(m => m !== '');
            const uniqueMarkers = [...new Set(markers)];

            const fnContainer = document.getElementById('concept-footnotes');
            
            // Preserve typed footnote texts during live re-renders
            let currentTexts = {};
            if (savedFootnotes) {
                currentTexts = savedFootnotes;
            } else {
                const existingRows = fnContainer.querySelectorAll('.footnote-entry');
                existingRows.forEach(row => {
                    const marker = row.getAttribute('data-marker');
                    const textEl = row.querySelector('.footnote-text');
                    currentTexts[marker] = textEl ? textEl.innerHTML : '';
                });
            }

            if (uniqueMarkers.length === 0) {
                fnContainer.style.display = 'none';
                fnContainer.innerHTML = '';
                return;
            }

            fnContainer.style.display = 'block';
            fnContainer.innerHTML = ''; // Rebuild list cleanly

            uniqueMarkers.forEach(marker => {
                const row = document.createElement('div');
                row.className = 'footnote-entry';
                row.setAttribute('data-marker', marker);

                const numSpan = document.createElement('sup');
                numSpan.className = 'footnote-num';
                numSpan.innerText = marker;

                const textSpan = document.createElement('div');
                textSpan.className = 'footnote-text';
                
                if (isEditorMode && editorState === 'active' && !isPreviewing) {
                    textSpan.classList.add('editable-field');
                    textSpan.contentEditable = true;
                }
                
                textSpan.setAttribute('data-placeholder', 'Enter footnote text...');
                if (currentTexts[marker]) {
                    textSpan.innerHTML = currentTexts[marker];
                }

                row.appendChild(numSpan);
                row.appendChild(textSpan);

                fnContainer.appendChild(row);
            });
        }

        // Use event delegation on the viewer UI to handle dynamic edits across all fields
        document.getElementById('viewer-ui').addEventListener('input', (e) => {
            if (isEditorMode && editorState === 'active') {
                if (e.target.classList.contains('editable-field') && !e.target.classList.contains('footnote-text')) {
                    syncFootnotes();
                }
            }
        });

        // Dynamic Margin Resizing & Font Shrinking logic
        function checkScrollAndResize() {
            const mainContent = document.getElementById('main-content');
            const desc = document.getElementById('concept-description');
            const isMobile = window.innerWidth <= 850;
            
            // Reset state to measure cleanly
            desc.classList.remove('reduced-font');
            
            requestAnimationFrame(() => {
                let isOverflowing = false;
                if (isMobile) {
                    // Test if native body scroll is longer than window
                    isOverflowing = document.documentElement.scrollHeight > window.innerHeight;
                } else {
                    // Test if fixed viewport is overflowing
                    isOverflowing = mainContent.scrollHeight > mainContent.clientHeight;
                }
                
                if (isOverflowing) {
                    desc.classList.add('reduced-font');
                }
                
                // Allow style to paint then adjust vertical centering
                requestAnimationFrame(() => adjustTopMargin());
            });
        }

        function adjustTopMargin() {
            const viewer = document.getElementById('viewer-ui');
            const list = document.getElementById('editor-entry-list');
            
            let activeEl = null;
            if (window.getComputedStyle(viewer).display !== 'none' && viewer.offsetHeight > 0) activeEl = viewer;
            else if (window.getComputedStyle(list).display !== 'none' && list.offsetHeight > 0) activeEl = list;
            
            if (activeEl) {
                const isMobile = window.innerWidth <= 850;
                
                if (isMobile) {
                    // Mobile uses CSS top padding on #main-content to avoid overlapping topbar
                    activeEl.style.marginTop = '0px'; 
                } else {
                    const contentHeight = activeEl.offsetHeight;
                    const vh20 = window.innerHeight * 0.20;
                    const centeredMargin = (window.innerHeight - contentHeight) / 2 - 40; 
                    activeEl.style.marginTop = Math.max(vh20, centeredMargin) + 'px';
                }
            }
        }

        // Attach observer to gracefully animate the center positioning on content changes
        const marginObserver = new ResizeObserver(() => adjustTopMargin());
        marginObserver.observe(document.getElementById('viewer-ui'));
        marginObserver.observe(document.getElementById('editor-entry-list'));
        window.addEventListener('resize', () => checkScrollAndResize());

        function togglePreview() {
            if (currentConceptIndex === -3) {
                playSound('alert');
                alert("The Settings page cannot be edited.");
                return;
            }

            const btn = document.getElementById('btn-preview');
            
            let fields = [document.getElementById('concept-title')];
            if (currentConceptIndex === -1) {
                fields.push(document.getElementById('about-main-desc'));
                fields.push(document.getElementById('about-cas-desc'));
                fields.push(document.getElementById('about-pc-desc'));
                fields.push(document.getElementById('about-map-desc'));
            } else {
                fields.push(document.getElementById('concept-description'));
            }

            if (!isPreviewing) {
                fields.forEach(el => {
                    if(el) {
                        el.contentEditable = false;
                        el.classList.remove('editable-field');
                    }
                });
                btn.innerText = "Keep Editing";
                btn.style.backgroundColor = "#e67e22";
                isPreviewing = true;
            } else {
                fields.forEach(el => {
                    if(el) {
                        el.contentEditable = true;
                        el.classList.add('editable-field');
                    }
                });
                btn.innerText = "Preview";

                    const el = document.getElementById(id);

                if(descEl) sups = Array.from(descEl.querySelectorAll('sup'));

            let nextNum = 1;
            if (sups.length > 0) {

                sups.forEach(sup => {

                    if (!isNaN(num) && num > max) max = num;

                nextNum = max + 1;

            document.execCommand('insertHTML', false, `<sup>${nextNum}</sup>`);

                    aboutConcept.footnotes = fns;
                    
                    const slug = "conceptualadaptivesystem";
                    document.getElementById('url-concept').textContent = slug;
                    updateURL(slug);
                    
                    playSound('success');
                    alert("Landing Page updated in temporary memory. Click 'Export HTML' to permanently save.");
                } else {
                    playSound('alert');
                    alert("Please ensure title and main description are properly filled.");
                }
            } else {
                // Save logic for normal Concept
                const description = document.getElementById('concept-description').innerHTML.trim();
                if (title && description && title !== "New Concept Title") {
                    concepts[currentConceptIndex].title = title;
                    concepts[currentConceptIndex].description = description;
                    concepts[currentConceptIndex].footnotes = fns;
                    
                    renderAlphabetNav();
                    const slug = title.toLowerCase().replace(/\s+/g, '');
                    document.getElementById('url-concept').textContent = slug;
                    updateURL(slug);
                    
                    playSound('success');
                    alert("Concept updated in temporary memory. Click 'Export HTML' to permanently save.");
                } else {
                    playSound('alert');
                    alert("Please ensure both title and description are properly filled.");
                }
            }
        }

        function saveNewConcept() {
            const title = document.getElementById('concept-title').innerText.trim();
            const description = document.getElementById('concept-description').innerHTML.trim();

            const fnContainer = document.getElementById('concept-footnotes');
            const fns = {};
            fnContainer.querySelectorAll('.footnote-entry').forEach(row => {
                const marker = row.getAttribute('data-marker');
                const text = row.querySelector('.footnote-text').innerHTML.trim();
                if (text) fns[marker] = text;
            });

            if (title && description && title !== "New Concept Title") {
                concepts.push({ title, description, footnotes: fns });
                renderAlphabetNav();
                showConcept(concepts.length - 1); // Bind to newly created concept
                playSound('success');
                alert("New concept added to temporary memory. Click 'Export HTML' to permanently save to disk.");
            } else {
                playSound('alert');
                alert("Please ensure both title and description are properly filled.");
            }
        }

        function exportHTML() {
            const clone = document.documentElement.cloneNode(true);
            
            let dataScript = clone.querySelector('#glossary-data');
            dataScript.textContent = '\n' + JSON.stringify(concepts, null, 4) + '\n    ';

            let aboutScript = clone.querySelector('#about-data');
            aboutScript.textContent = '\n' + JSON.stringify(aboutConcept, null, 4) + '\n    ';
            
            // Strip out editor states globally
            const menu = clone.querySelector('#editor-menu');
            if (menu) menu.style.display = 'none';

            const entryList = clone.querySelector('#editor-entry-list');
            if (entryList) entryList.style.display = 'none';
            
            const toolbar = clone.querySelector('#editor-toolbar');
            if (toolbar) toolbar.style.display = 'none';
            
            const status = clone.querySelector('#editor-status');
            if (status) status.style.display = 'none';
            
            const viewer = clone.querySelector('#viewer-ui');
            if (viewer) viewer.style.display = 'block';

            // Clean up transient elements that shouldn't be serialized
            clone.querySelectorAll('.cursor-trail-dot').forEach(el => el.remove());
            
            clone.querySelectorAll('.editable-field').forEach(el => {
                el.removeAttribute('contenteditable');
                el.classList.remove('editable-field');
            });

            // Strip visual toggles so the exported file opens natively
            clone.querySelector('body').className = ''; 
            
            // Remove the loading screen from exported HTML so it doesn't replay when reopening from local file 
            const loadingScreen = clone.querySelector('#loading-screen');
            if (loadingScreen) {
                loadingScreen.remove();
            }
            
            const htmlContent = '<!DOCTYPE html>\n' + clone.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'civilisationtheory.html'; 
            document.body.appendChild(a); 
            a.click();
            
            a.remove();
            URL.revokeObjectURL(url);
        }

        document.addEventListener('keydown', function(event) {
            const key = event.key.toLowerCase();
            
            // Esc handling for Editor Logic
            if (event.key === 'Escape' && isEditorMode) {
                if (editorState === 'active' || editorState === 'list') {
                    playSound('click');
                    showEditorMenu();
                } else if (editorState === 'menu') {
                    exitEditor();
                }
                return;
            }

            // Ignore styling hotkeys if actively typing in inputs
            if (event.target.isContentEditable || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                if (event.ctrlKey && event.shiftKey && (key === 'e')) {
                    event.preventDefault(); 
                    exitEditor();
                }
                return;
            }

            // Display Mode Toggles
            if (key === 't') toggleThemeMode();
            
            if (key === 'b') {
                playSound('toggle');
                document.body.classList.toggle('bg-match-mode');
            }

            if (key === 'g') {
                playSound('toggle');
                document.body.classList.toggle('gradient-mode');
            }

            if (key === 'c') {
                playSound('toggle');
                document.body.classList.toggle('alt-cursor');
            }
            
            if (key === 'h') toggleHUDMode();

            if (key === 'a') cycleArtStyle();

            // Open Index/Map
            if (key === 'i') {
                playSound('toggle');
                showAbout();
            }

            // Open Settings
            if (key === 's') {
                playSound('toggle');
                showSettings();
            }
            
            // Editor Mode Trigger
            if (event.ctrlKey && event.shiftKey && (key === 'e')) {
                event.preventDefault(); 
                if (!isEditorMode) {
                    const password = prompt("Enter Editor Password:");
                    if (password === 'changingcivilisation') {
                        enterEditor();
                    } else if (password !== null) {
                        playSound('alert');
                        alert("Incorrect password.");
                    }
                } else {
                    exitEditor();
                }
            }
        });
        
        window.addEventListener('popstate', function(event) {
            let titleToMatch = window.location.hash.replace('#', '');

            if (titleToMatch) {
                const index = concepts.findIndex(c => c.title.toLowerCase().replace(/\s+/g, '') === titleToMatch);
                if(index !== -1) {
                    showConcept(index);
                } else if (titleToMatch === 'conceptualadaptivesystem') {
                    showAbout();
                } else if (titleToMatch === 'controls' || titleToMatch === 'settings') {
                    showSettings();
                } else {
                    showAbout();
                }
            } else {
                showAbout();
            }
        });
        
        window.addEventListener('hashchange', function() {
            let titleToMatch = window.location.hash.replace('#', '');
            
            if (titleToMatch) {
                const index = concepts.findIndex(c => c.title.toLowerCase().replace(/\s+/g, '') === titleToMatch);
                if(index !== -1) {
                    showConcept(index);
                } else if (titleToMatch === 'conceptualadaptivesystem') {
                    showAbout();
                } else if (titleToMatch === 'controls' || titleToMatch === 'settings') {
                    showSettings();
                } else {
                    showAbout();
                }
            } else {
                showAbout();
            }
        });

        // Initialize App safely regardless of parsing state
        document.addEventListener("DOMContentLoaded", () => {
            // Initiate trailing cursor immediately
            initCursorTrail();

            // Handle loading sequence purely based on DOM presence 
            const loader = document.getElementById('loading-screen');
            if(loader) {
                setTimeout(() => document.body.classList.toggle('dark-mode'), 1125); 
                setTimeout(() => document.body.classList.toggle('dark-mode'), 2625);
                
                setTimeout(() => {
                    loader.classList.add('hidden');
                    setTimeout(() => {
                        loader.style.display = 'none';
                        initUIAutoHide();
                    }, 500); 
                }, 3000); 
            } else {
                initUIAutoHide();
            }

            // Safe parsing trigger
            try {
                loadConcepts();
            } catch (e) {
                console.error("Critical routing error intercepted:", e);
            }
        });

    </script>
</body>
</html>
